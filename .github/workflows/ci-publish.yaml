name: CI Publish

on:
  workflow_run:
    workflows: ["CI Build"]
    types: [completed]

jobs:
  publish:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    permissions:
      actions: read
      contents: read
      pull-requests: write
      security-events: write
      statuses: write
    steps:
      - name: Set pending status on PR
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.workflow_run.head_sha }}',
              state: 'pending',
              context: 'CI Publish',
              description: 'Publishing CI image...',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });

      - name: Download build artifacts
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ci-build
          run-id: ${{ github.event.workflow_run.id }}
          github-token: ${{ github.token }}

      - name: Load PR metadata
        id: meta
        run: |
          echo "pr-number=$(cat pr-number.txt)" >> "$GITHUB_OUTPUT"
          echo "pr-sha=$(cat pr-sha.txt)" >> "$GITHUB_OUTPUT"

      - name: Load and tag image
        env:
          IMAGE: quay.io/trustyai/trustyai-service-python-ci
          TAG: ${{ steps.meta.outputs.pr-sha }}
        run: |
          docker load < image.tar.gz
          docker tag "trustyai-ci:${TAG}" "${IMAGE}:${TAG}"

      - name: Log in to Quay
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_ROBOT_SECRET }}
        run: echo "${QUAY_PASSWORD}" | docker login -u "${QUAY_USERNAME}" --password-stdin quay.io

      - name: Push to Quay
        env:
          IMAGE: quay.io/trustyai/trustyai-service-python-ci
          TAG: ${{ steps.meta.outputs.pr-sha }}
        run: docker push "${IMAGE}:${TAG}"

      - name: Set up CI manifests
        env:
          IMAGE: quay.io/trustyai/trustyai-service-python-ci
          TAG: ${{ steps.meta.outputs.pr-sha }}
          PR_NUMBER: ${{ steps.meta.outputs.pr-number }}
        run: |
          git clone https://github.com/trustyai-explainability/trustyai-service-operator
          cd trustyai-service-operator
          sed -i "s#quay.io/trustyai/trustyai-service:latest#${IMAGE}:${TAG}#" ./config/base/params.env
          sed -i "s#quay.io/trustyai/trustyai-service:latest#${IMAGE}:${TAG}#" ./config/overlays/odh/params.env
          sed -i "s#quay.io/trustyai/trustyai-service:latest#${IMAGE}:${TAG}#" ./config/overlays/rhoai/params.env
          rm -Rf $(ls . | grep -v config)
          rm -Rf .gitignore .dockerignore .github .git .yamllint.yaml
          echo "## Automatically Generated Manifests for Service CI" > README.md
          echo "Generated by [Service PR #${PR_NUMBER}](https://github.com/trustyai-explainability/trustyai-service/pull/${PR_NUMBER})" >> README.md

      - name: Push CI manifests
        uses: cpina/github-action-push-to-another-repository@55306faa4ed53b815ae49e564af8cfb359d32ae2  # v1.7.3
        env:
          SSH_DEPLOY_KEY: ${{ secrets.TRUSTYAI_CI_BOT_SSH_KEY }}
        with:
          source-directory: 'trustyai-service-operator'
          destination-github-username: 'trustyai-ci-bot'
          destination-repository-username: 'trustyai-explainability'
          destination-repository-name: 'trustyai-service-operator-ci'
          target-branch: service-python-${{ steps.meta.outputs.pr-sha }}
          create-target-branch-if-needed: 'true'

      - name: Find existing comment
        uses: peter-evans/find-comment@3eae4d37986fb5a8592848f6a574fdf654e61f9e # v3
        id: fc
        with:
          issue-number: ${{ steps.meta.outputs.pr-number }}
          comment-author: 'github-actions[bot]'
          body-includes: PR image build and manifest generation completed successfully

      - name: Post success comment
        uses: peter-evans/create-or-update-comment@71345be0265236311c031f5c7866368bd1eff043 # v4
        env:
          IMAGE: quay.io/trustyai/trustyai-service-python-ci
          TAG: ${{ steps.meta.outputs.pr-sha }}
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          issue-number: ${{ steps.meta.outputs.pr-number }}
          edit-mode: replace
          body: |
            PR image build and manifest generation completed successfully!

            📦 [PR image](https://quay.io/repository/trustyai/trustyai-service-python-ci?tab=tags&tag=${{ env.TAG }}): `${{ env.IMAGE }}:${{ env.TAG }}`

            🗂️ [CI manifests](https://github.com/trustyai-explainability/trustyai-service-operator-ci/tree/service-python-${{ env.TAG }})

            ```
            devFlags:
              manifests:
                - contextDir: config
                  sourcePath: ''
                  uri: https://api.github.com/repos/trustyai-explainability/trustyai-service-operator-ci/tarball/service-python-${{ env.TAG }}
            ```

      - name: Trivy scan
        continue-on-error: true
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        env:
          IMAGE: quay.io/trustyai/trustyai-service-python-ci
          TAG: ${{ steps.meta.outputs.pr-sha }}
        with:
          scan-type: 'image'
          image-ref: "${{ env.IMAGE }}:${{ env.TAG }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: Update Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-ci-scan'

      - name: Report final status to PR
        if: always()
        continue-on-error: true
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b # v7
        with:
          script: |
            const success = '${{ job.status }}' === 'success';
            await github.rest.repos.createCommitStatus({
              owner: context.repo.owner,
              repo: context.repo.repo,
              sha: '${{ github.event.workflow_run.head_sha }}',
              state: success ? 'success' : 'failure',
              context: 'CI Publish',
              description: success
                ? 'CI image published to Quay'
                : 'Failed to publish CI image',
              target_url: '${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}'
            });
