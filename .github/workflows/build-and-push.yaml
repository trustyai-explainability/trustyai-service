name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - 'LICENSE'
      - '**/.gitignore'
      - '**.md'
      - '**.adoc'
      - '*.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image tags
        id: tags
        env:
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${GIT_REF}" == refs/tags/v* ]]; then
            # Push both version tag and latest for releases
            echo "tags=${REF_NAME} latest" >> "$GITHUB_OUTPUT"
            echo "primary_tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            # Push only latest for main branch
            echo "tags=latest" >> "$GITHUB_OUTPUT"
            echo "primary_tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        env:
          QUAY_REPO: ${{ vars.QUAY_RELEASE_REPO }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          # Build image with first tag
          FIRST_TAG=$(echo "${TAGS}" | awk '{print $1}')
          docker build -f Containerfile -t "${QUAY_REPO}:${FIRST_TAG}" .

          # Tag with additional tags if present
          for tag in ${TAGS}; do
            if [[ "${tag}" != "${FIRST_TAG}" ]]; then
              docker tag "${QUAY_REPO}:${FIRST_TAG}" "${QUAY_REPO}:${tag}"
            fi
          done

      - name: Log in to Quay
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_ROBOT_SECRET }}
        run: echo "${QUAY_PASSWORD}" | docker login -u "${QUAY_USERNAME}" --password-stdin quay.io

      - name: Push to Quay
        env:
          QUAY_REPO: ${{ vars.QUAY_RELEASE_REPO }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          # Push all tags
          for tag in ${TAGS}; do
            docker push "${QUAY_REPO}:${tag}"
          done

      - name: Trivy scan
        uses: aquasecurity/trivy-action@57a97c7e7821a5776cebc9bb87c984fa69cba8f1 # 0.35.0
        with:
          scan-type: 'image'
          image-ref: "${{ vars.QUAY_RELEASE_REPO }}:${{ steps.tags.outputs.primary_tag }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: Update Security tab
        uses: github/codeql-action/upload-sarif@b0c4fd77f6c559021d78430ec4d0d169ae74a4eb # v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-release-scan'
