name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - 'LICENSE'
      - '**/.gitignore'
      - '**.md'
      - '**.adoc'
      - '*.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: tag
        env:
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${GIT_REF}" == refs/tags/v* ]]; then
            echo "tag=${REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        env:
          IMAGE_REF: "${{ vars.QUAY_RELEASE_REPO }}:${{ steps.tag.outputs.tag }}"
        run: docker build -f Containerfile -t "${IMAGE_REF}" .

      - name: Log in to Quay
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_ROBOT_SECRET }}
        run: echo "${QUAY_PASSWORD}" | docker login -u "${QUAY_USERNAME}" --password-stdin quay.io

      - name: Push to Quay
        env:
          IMAGE_REF: "${{ vars.QUAY_RELEASE_REPO }}:${{ steps.tag.outputs.tag }}"
        run: docker push "${IMAGE_REF}"

      - name: Trivy scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'image'
          image-ref: "${{ vars.QUAY_RELEASE_REPO }}:${{ steps.tag.outputs.tag }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: Update Security tab
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-results.sarif'
