name: Build and Push

on:
  push:
    branches:
      - main
    tags:
      - v*
    paths-ignore:
      - 'LICENSE'
      - '**/.gitignore'
      - '**.md'
      - '**.adoc'
      - '*.txt'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set image tags
        id: tags
        env:
          GIT_REF: ${{ github.ref }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          if [[ "${GIT_REF}" == refs/tags/v* ]]; then
            # Full version from tag (strip v prefix)
            VERSION="${REF_NAME#v}"
            # Sanitize for OCI image tag: replace + with - (OCI tags: [a-zA-Z0-9._-])
            SANITIZED_TAG="${REF_NAME//+/-}"
            echo "tags=${SANITIZED_TAG} latest" >> "$GITHUB_OUTPUT"
            echo "primary_tag=${SANITIZED_TAG}" >> "$GITHUB_OUTPUT"
            echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          else
            # Push only latest for main branch
            echo "tags=latest" >> "$GITHUB_OUTPUT"
            echo "primary_tag=latest" >> "$GITHUB_OUTPUT"
            echo "version=0.0.0.dev0" >> "$GITHUB_OUTPUT"
          fi

      - name: Build image
        env:
          QUAY_REPO: ${{ vars.QUAY_RELEASE_REPO }}
          TAGS: ${{ steps.tags.outputs.tags }}
          VERSION: ${{ steps.tags.outputs.version }}
          VCS_REF: ${{ github.sha }}
        run: |
          # Build image with first tag
          FIRST_TAG=$(echo "${TAGS}" | awk '{print $1}')
          docker build -f Containerfile \
            --build-arg VERSION="${VERSION}" \
            --build-arg BUILD_DATE="$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --build-arg VCS_REF="${VCS_REF}" \
            -t "${QUAY_REPO}:${FIRST_TAG}" .

          # Tag with additional tags if present
          for tag in ${TAGS}; do
            if [[ "${tag}" != "${FIRST_TAG}" ]]; then
              docker tag "${QUAY_REPO}:${FIRST_TAG}" "${QUAY_REPO}:${tag}"
            fi
          done

      - name: Log in to Quay
        env:
          QUAY_USERNAME: ${{ secrets.QUAY_ROBOT_USERNAME }}
          QUAY_PASSWORD: ${{ secrets.QUAY_ROBOT_SECRET }}
        run: echo "${QUAY_PASSWORD}" | docker login -u "${QUAY_USERNAME}" --password-stdin quay.io

      - name: Push to Quay
        env:
          QUAY_REPO: ${{ vars.QUAY_RELEASE_REPO }}
          TAGS: ${{ steps.tags.outputs.tags }}
        run: |
          # Push all tags
          for tag in ${TAGS}; do
            docker push "${QUAY_REPO}:${tag}"
          done

      - name: Trivy scan
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # 0.36.0
        with:
          scan-type: 'image'
          image-ref: "${{ vars.QUAY_RELEASE_REPO }}:${{ steps.tags.outputs.primary_tag }}"
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'MEDIUM,HIGH,CRITICAL'
          exit-code: '0'
          ignore-unfixed: false
          vuln-type: 'os,library'

      - name: Update Security tab
        uses: github/codeql-action/upload-sarif@dd903d2e4f5405488e5ef1422510ee31c8b32357 # v3
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'trivy-release-scan'
