version: 2
updates:
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - trustyai-explainability/reviewers
    reviewers:
      - trustyai-explainability/reviewers

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - trustyai-explainability/reviewers
    reviewers:
      - trustyai-explainability/reviewers

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
    assignees:
      - trustyai-explainability/reviewers
    reviewers:
      - trustyai-explainability/reviewers
